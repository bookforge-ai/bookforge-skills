# Deployment topology — reveals quantum boundaries
# Services that scale together and share networks are in the same quantum.

version: "3.9"

services:
  # ── Bidding Quantum ──────────────────────────────────────
  # Bidder and Auction share a network and scale together.
  bidder:
    build: ./bidder_service
    ports: ["8001:8001"]
    networks: [bidding_net]
    depends_on: [auction]
    deploy:
      replicas: 3          # high elasticity — burst traffic
      resources:
        limits: { cpus: "1.0", memory: "512M" }

  auction:
    build: ./auction_service
    ports: ["8002:8002"]
    networks: [bidding_net, backend_net]
    depends_on: [rabbitmq]
    deploy:
      replicas: 3          # scales with bidder
      resources:
        limits: { cpus: "1.0", memory: "512M" }

  # ── Payment Quantum ─────────────────────────────────────
  # Independently deployed; consumes events asynchronously.
  payment:
    build: ./payment_service
    ports: ["8003:8003"]
    networks: [backend_net]
    depends_on: [rabbitmq]
    deploy:
      replicas: 1          # reliability over scale
      resources:
        limits: { cpus: "0.5", memory: "256M" }

  # ── Notification Quantum ────────────────────────────────
  # Independently deployed; consumes events asynchronously.
  notification:
    build: ./notification_service
    ports: ["8004:8004"]
    networks: [backend_net]
    depends_on: [rabbitmq]
    deploy:
      replicas: 2          # availability — always reachable
      resources:
        limits: { cpus: "0.25", memory: "128M" }

  # ── Infrastructure ──────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]
    networks: [backend_net]

networks:
  bidding_net:             # private to bidding quantum
    driver: bridge
  backend_net:             # shared bus for async messaging
    driver: bridge
